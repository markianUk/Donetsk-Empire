Congratulations! = Félicitations !
We are children of miners who want to rebuild Ukraine. = Nous sommes les enfants des mineurs qui veulent reconstruire l'Ukraine.
The Doetzian Empire came into fashion, which, due to the events of 2014, separated and began to exist independently, but despite Moscow's influence, people were essentially slaves, and on February 24, 2022, Moscow attacked and occupied independent Ukraine, and the world's reaction to this was sluggish, and because of this, people in Donbass begin to organize themselves and fight against the yoke of Moscow, (Note: the developer has never been to the Donetsk region, so please do not scold. = L'Empire de Donetsk, à la suite des événements de 2014, s'est séparé et a commencé à exister de manière indépendante. Malgré l'influence de Moscou, les gens étaient essentiellement des esclaves. Le 24 février 2022, Moscou a attaqué et occupé l'Ukraine indépendante, et la réaction du monde a été lente. C'est pourquoi les habitants du Donbass ont commencé à s'organiser et à lutter contre le joug moscovite. (Note : le développeur n'a jamais été dans la région de Donetsk, veuillez ne pas le réprimander.)
You are not worthy of war with me! = Misérable, tu n'es pas digne de me faire la guerre !
